version: 2

# Tuned for signal over freshness. Everything is monthly and grouped, so this repo
# produces roughly ONE pull request a month instead of a weekly stream across three
# ecosystems — a wall of individual dependency PRs just gets ignored, which is worse
# than not having them.
#
# Major bumps are deliberate migrations (python 3.11 -> 3.14 is not a Monday job), so
# they are excluded. Run them by hand when you actually want to do the work.
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      python-dependencies:
        patterns: ['*']
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  # The workflows pin action versions; these go stale silently otherwise.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    labels:
      - ci
    groups:
      github-actions:
        patterns: ['*']
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    labels:
      - docker
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]
