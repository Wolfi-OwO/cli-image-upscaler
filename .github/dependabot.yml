version: 2

# Tuned for signal over freshness. Everything is monthly and grouped, so this repo
# produces roughly ONE pull request a month instead of a weekly stream across three
# ecosystems — a wall of individual dependency PRs just gets ignored, which is worse
# than not having them.
#
# Major bumps are deliberate migrations (python 3.11 -> 3.14 is not a Monday job), so
# they are excluded. Run them by hand when you actually want to do the work.
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - dependencies
    groups:
      python-dependencies:
        patterns: ['*']
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  # The workflows pin action versions; these go stale silently otherwise.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - ci
    groups:
      github-actions:
        patterns: ['*']
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: '*'
        update-types: [version-update:semver-major]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 1
    labels:
      - docker
    groups:
      docker:
        patterns: ["*"]
    ignore:
      # The base image is python:3.x-slim, so a 3.11 -> 3.14 bump is semver-MINOR,
      # not major — the major-only rule below never caught it and dependabot opened
      # an unmergeable PR. The AI stack hard-caps us at Python 3.12 (see Dockerfile),
      # so minor bumps are excluded too. Patch bumps still flow, which is where the
      # security fixes are.
      - dependency-name: 'python'
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
      - dependency-name: '*'
        update-types: [version-update:semver-major]
