name: Bug report
description: Report a problem with image-upscaler
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) you ran.
      placeholder: |
        upscale run photo.jpg -s 16 -m anime
      render: shell
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `upscale --version`.
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - "auto"
        - "realesrgan"
        - "lanczos"
        - "not sure"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system / Python version
      placeholder: "Windows 11, Python 3.11"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run with `--verbose` and paste any error output.
      render: shell
